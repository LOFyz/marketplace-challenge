packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/users/*'
  - 'libs/orders/*'

# Dependencies allowed to run install/build scripts. pnpm 11 ERRORS on any package
# with a build script that isn't decided here (`pnpm approve-builds` writes this).
# These are every package pnpm flags for this workspace: native addons
# (@swc/core, esbuild, @parcel/watcher, unrs-resolver) + protobuf/nest/nx/less.
allowBuilds:
  '@apollo/protobufjs': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  nx: true
  protobufjs: true
  unrs-resolver: true
