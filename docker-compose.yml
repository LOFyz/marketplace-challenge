# Marketplace Challenge — local dev stack (escopo §11.3).
#
# Node services run in dev mode: the workspace is mounted and the service runs
# `pnpm nx serve <app>` (Nx local cache mounted at .nx/cache). Production multi-stage
# images live with the SST/deploy change. WordPress + RabbitMQ + Postgres + MySQL +
# OTel Collector + Jaeger back the stack. All app services emit OTLP to the collector.
name: marketplace-challenge

# Shared template for the Nx Node/Nest services.
x-node-app: &node-app
  image: node:20-bookworm-slim
  working_dir: /workspace
  entrypoint: ['sh', '-c']
  volumes:
    - .:/workspace
    - node_modules:/workspace/node_modules
    - nx-cache:/workspace/.nx/cache
  networks:
    - marketplace

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc

services:
  # ---- Gateway -------------------------------------------------------------
  gateway:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve gateway'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: gateway
    ports:
      - '3000:3000'
    depends_on:
      otel-collector:
        condition: service_started
      users-suppliers:
        condition: service_started
      orders-cart:
        condition: service_started
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/graphql').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ---- Federated subgraphs -------------------------------------------------
  users-suppliers:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve users-suppliers'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: users-suppliers
      DATABASE_URL: postgres://marketplace:marketplace@postgres:5432/users
    ports:
      - '3001:3000'
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  orders-cart:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve orders-cart'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: orders-cart
      DATABASE_URL: postgres://marketplace:marketplace@postgres:5432/orders
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    ports:
      - '3002:3000'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ---- Saga workers (RabbitMQ microservices, no HTTP) ----------------------
  payment-processor:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve payment-processor'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-processor
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  stock-worker:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve stock-worker'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: stock-worker
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ---- Auth + MCP ----------------------------------------------------------
  better-auth:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve better-auth'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: better-auth
      DATABASE_URL: postgres://marketplace:marketplace@postgres:5432/auth
    ports:
      - '3003:3000'
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  mcp-server:
    <<: *node-app
    command: 'corepack enable && pnpm install --frozen-lockfile && pnpm nx serve mcp-server'
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: mcp-server
      GATEWAY_URL: http://gateway:3000/graphql
    ports:
      - '3004:3000'
    depends_on:
      gateway:
        condition: service_started
      otel-collector:
        condition: service_started

  # ---- Catalog: WordPress + WooCommerce + WPGraphQL -------------------------
  wordpress:
    build:
      context: ./apps/wordpress
      dockerfile: Dockerfile
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    ports:
      - '8080:80'
    networks:
      - marketplace
    depends_on:
      mysql:
        condition: service_healthy

  # ---- Backing services ----------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: marketplace
      RABBITMQ_DEFAULT_PASS: marketplace
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - marketplace
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - marketplace
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketplace']
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - '3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - marketplace
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uwordpress', '-pwordpress']
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Observability -------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ['--config=/etc/otel/collector-config.yaml']
    volumes:
      - ./tools/otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    networks:
      - marketplace
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
    networks:
      - marketplace

networks:
  marketplace:
    driver: bridge

volumes:
  node_modules:
  nx-cache:
  pgdata:
  mysqldata:
