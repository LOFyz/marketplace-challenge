# Marketplace Challenge — local dev stack (escopo §11.3).
#
# Node services run in dev mode: the workspace is mounted and the service runs
# `pnpm nx serve <app>` (Nx local cache mounted at .nx/cache). Production multi-stage
# images live with the SST/deploy change. WordPress + RabbitMQ + Postgres + MySQL +
# OTel Collector + Jaeger back the stack. All app services emit OTLP to the collector.
#
# Dependencies are installed ONCE by the `install` one-shot into the shared
# `node_modules` volume; every Node service waits for it (so they never race to
# `pnpm install` into the same volume) and then just runs `corepack enable && nx …`.
name: marketplace-challenge

# Shared template for the Nx Node/Nest services.
x-node-app: &node-app
  # Node 22+ is required: corepack's pnpm 11 imports `node:sqlite`, absent before
  # Node 22.5. (package.json pins pnpm@11.4.0 so every container uses the same one.)
  image: node:22-bookworm-slim
  working_dir: /workspace
  entrypoint: ['sh', '-c']
  volumes:
    - .:/workspace
    - node_modules:/workspace/node_modules
    - nx-cache:/workspace/.nx/cache
  # Each container gets its OWN ephemeral Nx coordination dir. Without this, all
  # node services share the bind-mounted .nx/workspace-data, and Nx's task-run
  # locks (machine-v2.db) collide across containers: after a restart a service
  # waits forever for "<project>:serve:development in another nx process" — a
  # dead PID from the previous run in a sibling container. A tmpfs is wiped on
  # every container start, so each boot has clean, isolated coordination state.
  # (Build cache stays shared via the nx-cache volume above.)
  tmpfs:
    - /workspace/.nx/workspace-data
  networks:
    - marketplace

# Every Node service waits for the one-shot install to finish.
x-needs-install: &needs-install
  install:
    condition: service_completed_successfully

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc

# Single shared Postgres DB (escopo: users/orders), discrete vars for MikroORM.
x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: '5432'
  DB_NAME: marketplace
  DB_USER: marketplace
  DB_PASSWORD: marketplace

services:
  # ---- One-shot dependency install (populates the shared node_modules volume) -
  # NOTE: command is a single-element list. With `entrypoint: ['sh','-c']`, a
  # plain string command gets tokenized by Compose, so only `corepack` would run
  # ("Corepack <command>" help + exit). The list keeps the whole `&&` chain as
  # one argument to `sh -c`.
  install:
    <<: *node-app
    command: ['corepack enable && pnpm install --frozen-lockfile']
    restart: 'no'

  # ---- Gateway -------------------------------------------------------------
  gateway:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve gateway']
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: gateway
      SUBGRAPH_USERS_URL: http://users-suppliers:3000/graphql
      SUBGRAPH_ORDERS_URL: http://orders-cart:3000/graphql
      AUTH_JWKS_URL: http://better-auth:3000/auth/jwks
      AUTH_ISSUER: http://localhost:3003/auth
      AUTH_AUDIENCE: marketplace
    ports:
      - '3000:3000'
    depends_on:
      <<: *needs-install
      otel-collector:
        condition: service_started
      # Wait until the subgraphs are actually serving GraphQL, not merely
      # started: the gateway composes the supergraph once at boot via
      # IntrospectAndCompose and exits(1) if a subgraph isn't reachable yet.
      better-auth:
        condition: service_healthy
      users-suppliers:
        condition: service_healthy
      orders-cart:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/graphql').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ---- Federated subgraphs -------------------------------------------------
  users-suppliers:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve users-suppliers']
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: users-suppliers
    ports:
      - '3001:3000'
    depends_on:
      <<: *needs-install
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      # POST (not GET): Apollo Server v4 blocks GET to /graphql via CSRF prevention.
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query:'{__typename}'})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  orders-cart:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve orders-cart']
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: orders-cart
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    ports:
      - '3002:3000'
    depends_on:
      <<: *needs-install
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # POST (not GET): Apollo Server v4 blocks GET to /graphql via CSRF prevention.
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query:'{__typename}'})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ---- Saga workers (RabbitMQ microservices, no HTTP) ----------------------
  payment-processor:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve payment-processor']
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-processor
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    depends_on:
      <<: *needs-install
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  stock-worker:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve stock-worker']
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: stock-worker
      RABBITMQ_URL: amqp://marketplace:marketplace@rabbitmq:5672
    depends_on:
      <<: *needs-install
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ---- Auth + MCP ----------------------------------------------------------
  better-auth:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve better-auth']
    environment:
      <<: [*otel-env, *db-env]
      OTEL_SERVICE_NAME: better-auth
      # Listen on the in-container 3000 like every other app (the app defaults to
      # 3003 for standalone host dev); the host mapping below exposes it as :3003,
      # and the gateway reaches JWKS at http://better-auth:3000/auth/jwks.
      PORT: '3000'
      BETTER_AUTH_SECRET: dev-secret-change-me
      BETTER_AUTH_URL: http://localhost:3003
      BETTER_AUTH_BASE_PATH: /auth
      BETTER_AUTH_ISSUER: http://localhost:3003/auth
      BETTER_AUTH_AUDIENCE: marketplace
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3000,http://localhost:3003
    ports:
      - '3003:3000'
    depends_on:
      <<: *needs-install
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mcp-server:
    <<: *node-app
    command: ['corepack enable && pnpm nx serve mcp-server']
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: mcp-server
      GATEWAY_URL: http://gateway:3000/graphql
    ports:
      - '3004:3000'
    depends_on:
      <<: *needs-install
      gateway:
        condition: service_started
      otel-collector:
        condition: service_started

  # ---- One-shot DB migrator (marketplace + Better Auth tables, seed clients) -
  migrator:
    <<: *node-app
    command: ['corepack enable && pnpm nx run migrator:build && node apps/migrator/dist/main.js']
    environment:
      <<: *db-env
    restart: 'no'
    depends_on:
      <<: *needs-install
      postgres:
        condition: service_healthy

  # ---- Catalog: WordPress + WooCommerce + WPGraphQL -------------------------
  wordpress:
    build:
      context: ./apps/wordpress
      dockerfile: Dockerfile
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    ports:
      - '8080:80'
    networks:
      - marketplace
    depends_on:
      mysql:
        condition: service_healthy

  # ---- Backing services ----------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: marketplace
      RABBITMQ_DEFAULT_PASS: marketplace
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - marketplace
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - marketplace
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketplace']
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - '3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - marketplace
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uwordpress', '-pwordpress']
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Observability -------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ['--config=/etc/otel/collector-config.yaml']
    volumes:
      - ./tools/otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    networks:
      - marketplace
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
    networks:
      - marketplace

networks:
  marketplace:
    driver: bridge

volumes:
  node_modules:
  nx-cache:
  pgdata:
  mysqldata:
